name: Feature request
description: Suggest a new capability or improvement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Before filing, please check the spec
        ([PROMPT_SPEC.md](../../blob/main/PROMPT_SPEC.md)) — it may already
        be planned or explicitly out of scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain or missing capability.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the UX or API look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why they were rejected.

  - type: dropdown
    id: scope
    attributes:
      label: Which layer does this touch?
      multiple: true
      options:
        - CLI (commands, input)
        - UI (Rich, theme, layout)
        - Agents (router, sub-agents, mediator)
        - Providers (wire-codecs, transports)
        - CodeGraph (indexing, queries)
        - Orchestration (parallel, retries)
        - Gateway (FastAPI shim)
        - Plugins
        - Docs / DX
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I checked PROMPT_SPEC.md and the roadmap.
          required: true
        - label: I searched existing issues for duplicates.
          required: true
